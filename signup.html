<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"
    ></script>
    <script src="js/script.js" defer></script>
    <title>Sign Up - Academic Performance Tracker</title>
  </head>
  <body>
    <nav class="index-nav">
      <div class="index-nav-right">
        <div class="nav-title">Academic Tracker</div>
        <div class="index-nav-links">
          <a href="index.html"
            ><ion-icon name="home-outline"></ion-icon> Home</a
          >
        </div>
      </div>

      <div
        id="theme-toggle"
        role="button"
        tabindex="0"
        aria-label="Toggle theme"
      >
        <ion-icon name="moon-outline"></ion-icon>
      </div>
    </nav>

    <div class="signup-container">
      <div class="signup-card">
        <h1>Create Account</h1>
        <p>Join thousands of students tracking their success</p>

        <div id="error-message"></div>

        <form id="signup-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="At least 6 characters"
                required
              />
              <button
                type="button"
                id="toggle-signup-password"
                class="password-toggle"
                aria-label="Show password"
                aria-pressed="false"
              >
                <ion-icon name="eye-outline" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-field">
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="Confirm your password"
                required
              />
              <button
                type="button"
                id="toggle-signup-confirm-password"
                class="password-toggle"
                aria-label="Show password"
                aria-pressed="false"
              >
                <ion-icon name="eye-outline" aria-hidden="true"></ion-icon>
              </button>
            </div>
            <div id="password-match" class="password-match"></div>
          </div>

          <button type="submit" class="signup-button">Create Account</button>
        </form>

        <div class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>

    <!-- Load services before page handler -->
    <script src="js/mock-data.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/grades.js"></script>
    <script src="js/services/study-tracker.js"></script>
    <script src="js/page-handlers/signup.js"></script>
  </body>
</html>

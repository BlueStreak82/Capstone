<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"
    ></script>
    <script src="js/script.js" defer></script>
    <title>Login - Academic Performance Tracker</title>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-title">Academic Tracker</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
      <div
        id="theme-toggle"
        role="button"
        tabindex="0"
        aria-label="Toggle theme"
      >
        <ion-icon name="moon-outline"></ion-icon>
      </div>
    </nav>

    <div class="login-container">
      <div class="login-card">
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your account</p>

        <div id="error-message"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="login-button">Sign In</button>
        </form>

        <div class="signup-link">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>
      </div>
    </div>

    <!-- Load services before page handler -->
    <script src="js/mock-data.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/grades.js"></script>
    <script src="js/services/study-tracker.js"></script>
    <script src="js/page-handlers/login.js"></script>
  </body>
</html>

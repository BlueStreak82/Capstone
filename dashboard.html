<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"
    ></script>
    <script src="js/script.js" defer></script>
    <title>Dashboard - Academic Performance Tracker</title>
    <style>
      .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
      }

      .user-info h1 {
        margin: 0;
        font-size: 28px;
      }

      .user-info p {
        color: var(--text-secondary);
        margin: 5px 0 0 0;
        font-size: 14px;
      }

      #logout-btn {
        padding: 10px 20px;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s ease;
      }

      #logout-btn:hover {
        background: #ff5252;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: var(--bg-secondary);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }

      .stat-card h3 {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin: 0 0 10px 0;
        font-weight: 600;
      }

      .stat-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--accent-color);
        margin: 0;
      }

      .stat-card p {
        margin: 5px 0 0 0;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .section {
        margin-bottom: 40px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--accent-color);
        padding-bottom: 10px;
      }

      .section-header h2 {
        margin: 0;
        font-size: 22px;
      }

      .course-card {
        background: var(--bg-secondary);
        padding: 20px;
        border-radius: 8px;
        border-left: 4px solid var(--accent-color);
        margin-bottom: 15px;
        transition: transform 0.3s ease;
      }

      .course-card:hover {
        transform: translateX(5px);
      }

      .course-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .course-header h3 {
        margin: 0;
        font-size: 18px;
      }

      .grade-badge {
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 16px;
        color: white;
      }

      .grade-excellent {
        background: #51cf66;
      }

      .grade-good {
        background: #4dabff;
      }

      .grade-fair {
        background: #ffd43b;
        color: #333;
      }

      .grade-poor {
        background: #ff6b6b;
      }

      .course-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 13px;
      }

      .course-details p {
        margin: 5px 0;
        color: var(--text-secondary);
      }

      .session-item {
        background: var(--bg-secondary);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        border: 1px solid var(--border-color);
      }

      .session-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .session-header h4 {
        margin: 0;
        font-size: 16px;
      }

      .session-hours {
        background: var(--accent-color);
        color: white;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
      }

      .session-date {
        font-size: 12px;
        color: var(--text-secondary);
        margin: 5px 0;
      }

      .session-notes {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 8px 0 0 0;
        font-style: italic;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
      }

      .empty-state a {
        color: var(--accent-color);
        text-decoration: none;
        font-weight: 600;
      }

      .empty-state a:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        .dashboard-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 15px;
        }

        #logout-btn {
          width: 100%;
        }

        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .course-details {
          grid-template-columns: 1fr;
        }

        .session-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .session-hours {
          margin-top: 8px;
          align-self: flex-start;
        }
      }

      @media (max-width: 480px) {
        .dashboard-container {
          padding: 15px;
        }

        .dashboard-header h1 {
          font-size: 22px;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        .stat-value {
          font-size: 28px;
        }

        .section-header h2 {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-title">Academic Tracker</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a id="logout-btn" style="display: inline-block; margin: 0">Logout</a>
      </div>
      <div
        id="theme-toggle"
        role="button"
        tabindex="0"
        aria-label="Toggle theme"
      >
        <ion-icon name="moon-outline"></ion-icon>
      </div>
    </nav>

    <div class="dashboard-container">
      <!-- Dashboard Header -->
      <div class="dashboard-header">
        <div class="user-info">
          <h1>Welcome, <span id="user-name">User</span></h1>
          <p id="user-email">user@example.com</p>
        </div>
        <button
          id="logout-btn"
          style="display: none; position: absolute; top: 70px; right: 20px"
        >
          Logout
        </button>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Current GPA</h3>
          <p class="stat-value" id="gpa-value">0.00</p>
        </div>

        <div class="stat-card">
          <h3>Average Grade</h3>
          <p class="stat-value" id="avg-grade-value">0</p>
        </div>

        <div class="stat-card">
          <h3>Total Courses</h3>
          <p class="stat-value" id="courses-count">0</p>
        </div>

        <div class="stat-card">
          <h3>Study Hours</h3>
          <p class="stat-value" id="total-hours">0</p>
        </div>

        <div class="stat-card">
          <h3>Study Sessions</h3>
          <p class="stat-value" id="sessions-count">0</p>
        </div>

        <div class="stat-card">
          <h3>Avg Study Hours</h3>
          <p class="stat-value" id="avg-hours">0</p>
        </div>

        <div class="stat-card">
          <h3>Study Streak</h3>
          <p class="stat-value" id="study-streak">0 days</p>
        </div>
      </div>

      <!-- Grades Section -->
      <section class="section">
        <div class="section-header">
          <h2>📊 Your Courses</h2>
        </div>
        <div id="grades-container"></div>
      </section>

      <!-- Study Sessions Section -->
      <section class="section">
        <div class="section-header">
          <h2>📚 Recent Study Sessions</h2>
        </div>
        <div id="recent-sessions"></div>
      </section>
    </div>

    <!-- Load services before page handler -->
    <script src="js/mock-data.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/grades.js"></script>
    <script src="js/services/study-tracker.js"></script>
    <script src="js/page-handlers/dashboard.js"></script>
  </body>
</html>
